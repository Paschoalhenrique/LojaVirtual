spring:
  datasource:
    url: jdbc:h2:mem:lojavirtualdb
    driverClassName: org.h2.Driver
    username: sa
    password: '123' # Use aspas se a senha for apenas números
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create # Alterado para garantir a criação inicial
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080